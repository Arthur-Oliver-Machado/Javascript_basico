<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de DOM</title>
</head>

<body>
    <section>
    <h1 id="titulo">Teste de pagina utilizando DOM</h1>

    <button onclick="alterarTitulo()">Clique aqui</button>
    <button onclick="mostrarMensagem()">Clique aqui!</button>
</section>






<section>
    <input type="text" id="nome" placeholder="Mostar nome">
    <button onclick="mostrarNome()">Mostrar nome</button>
    <p id="resultado"></p>
</section>


<section>
    <h1>Verificador de idade</h1>
    <input type="number" id="idade" placeholder="Digite sua idade">
    <button onclick="verificarIdade()">Verificar</button>
    <p id="resultadoIdade"></p>
</section>



<section>
    <img id="imagem" src="IMGS/315371840_newjeans.jpg" alt="Imagem do grupo de KPOP da quarta geração, denominado New Jeans" width="250px">
    <button onclick="alterarImagem()">Trocar imagens</button>
</section>


    <script src="JS/script.js"></script>
</body>

</html>
