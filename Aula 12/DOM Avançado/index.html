<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes - OnlineFlex</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>

    <button id="tema">☀️ Modo Claro</button>

    <header>
        <h1>OnlineFlex</h1>
        <p>Alugue seu filme on-line!</p>
    </header>

    <div class="form-container">
        <h2>Cadastrar Filme</h2>
        <form id="filmeForm">
            <div class="form-group">
                <label for="nome">Nome do Filme:</label>
                <input type="text" placeholder="Digite o nome do filme" id="nome" required>
            </div>
            <div class="form-group">
                <label for="genero">Gênero:</label>
                <input type="text" placeholder="Digite o gênero do filme" id="genero" required>
            </div>
            <div class="form-group">
                <label for="ano">Ano de Lançamento:</label>
                <input type="number" placeholder="Digite a data de lançamento" id="ano" required>
            </div>
            <button type="submit" class="btn-cadastrar">Cadastrar Filme</button>
        </form>
    </div>

    <hr>

    <h2>Filmes Cadastrados</h2>
    <div id="lista-filmes"></div>

    <script src="JS/script.js"></script>
</body>
</html>
